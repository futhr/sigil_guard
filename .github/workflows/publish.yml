name: Publish

on:
  workflow_run:
    workflows: ["Build precompiled NIFs"]
    types: [completed]
  # Manual retry without rebuilding the release binaries
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish to Hex.pm
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    # Force-build the NIF throughout: the committed checksum file still
    # describes the previous release's binaries at this point, so a
    # precompiled-download compile would fail. The download step below
    # regenerates the checksums for the current release before publish.
    env:
      SIGIL_GUARD_BUILD: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref_name }}

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "28"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore deps cache
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: deps-${{ runner.os }}-28-1.18-${{ hashFiles('**/mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Run tests
        run: mix test --include nif

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run Credo
        run: mix credo --strict

      - name: Run Doctor
        run: mix doctor

      - name: Generate documentation
        run: mix docs

      - name: Download precompiled NIF checksums
        run: mix rustler_precompiled.download SigilGuard.Backend.NIF.Native --all --print

      - name: Publish to Hex.pm
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish --yes

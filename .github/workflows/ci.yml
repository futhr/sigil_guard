name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MIX_ENV: test
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  test:
    name: Test (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest
    needs: [quality, dialyzer, docs]

    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.17"
            otp: "27"
          - elixir: "1.18"
            otp: "28"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: deps-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: deps-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            native/sigil_guard_nif/target
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('native/sigil_guard_nif/Cargo.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test

      - name: Generate coverage report
        if: matrix.elixir == '1.18' && matrix.otp == '28'
        run: mix coveralls.lcov

      - name: Upload coverage reports to Codecov
        if: matrix.elixir == '1.18' && matrix.otp == '28'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "28"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: deps-${{ runner.os }}-28-1.18-${{ hashFiles('**/mix.lock') }}

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            native/sigil_guard_nif/target
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('native/sigil_guard_nif/Cargo.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run Credo
        run: mix credo --strict

      - name: Security audit
        run: mix deps.audit

      - name: Sobelow security scan
        run: mix sobelow --config

  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "28"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: deps-${{ runner.os }}-28-1.18-${{ hashFiles('**/mix.lock') }}

      - name: Restore PLT cache
        id: plt-cache
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: plt-${{ runner.os }}-28-1.18-${{ hashFiles('**/mix.lock') }}

      - name: Remove stale PLTs
        if: steps.plt-cache.outputs.cache-hit != 'true'
        run: rm -rf priv/plts

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            native/sigil_guard_nif/target
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('native/sigil_guard_nif/Cargo.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Run Dialyzer
        run: mix dialyzer

  docs:
    name: Documentation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "28"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: deps-${{ runner.os }}-28-1.18-${{ hashFiles('**/mix.lock') }}

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            native/sigil_guard_nif/target
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('native/sigil_guard_nif/Cargo.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Generate docs
        run: mix docs

      - name: Check doc coverage
        run: mix doctor

name: Build precompiled NIFs

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build_release:
    name: NIF ${{ matrix.nif }} - ${{ matrix.job.target }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}

    strategy:
      fail-fast: false
      matrix:
        nif: ["2.15"]
        job:
          - { target: aarch64-apple-darwin,        os: macos-15 }
          - { target: x86_64-apple-darwin,         os: macos-15 }
          - { target: aarch64-unknown-linux-gnu,   os: ubuntu-22.04, use-cross: true }
          - { target: aarch64-unknown-linux-musl,  os: ubuntu-22.04, use-cross: true }
          - { target: x86_64-unknown-linux-gnu,    os: ubuntu-22.04 }
          - { target: x86_64-unknown-linux-musl,   os: ubuntu-22.04, use-cross: true }
          - { target: x86_64-pc-windows-gnu,       os: windows-2025 }
          - { target: x86_64-pc-windows-msvc,      os: windows-2025 }

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Add Rust target
        if: matrix.job.target != '' && !matrix.job.use-cross
        run: rustup target add ${{ matrix.job.target }}

      - name: Build precompiled NIF
        id: build-crate
        uses: philss/rustler-precompiled-action@v1.1.4
        with:
          project-name: sigil_guard_nif
          project-dir: native/sigil_guard_nif
          target: ${{ matrix.job.target }}
          nif-version: ${{ matrix.nif }}
          use-cross: ${{ matrix.job.use-cross }}
          project-version: ${{ github.ref_name }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build-crate.outputs.file-name }}
          path: ${{ steps.build-crate.outputs.file-path }}
          if-no-files-found: error

  publish_release:
    name: Publish GitHub Release
    needs: build_release
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
